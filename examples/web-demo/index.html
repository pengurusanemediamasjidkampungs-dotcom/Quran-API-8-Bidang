<!DOCTYPE html>
<html lang="ms" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran 8 Ilmu API – Demo Al‑Fatihah</title>

    <!-- Font: Arabic & Monospace -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

    <!-- Gaya asas (external) -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">

    <!-- Butang tema -->
    <div class="theme-bar">
        <button class="theme-btn" id="theme-light" title="Cahaya siang">☀️</button>
        <button class="theme-btn" id="theme-dark" title="Malam gelap">🌙</button>
        <button class="theme-btn" id="theme-coffee" title="Kopi santai">☕</button>
    </div>

    <div class="container">
        <h1>📖 Surah Al‑Fatihah – 8 Ilmu</h1>

        <div class="legend">
            <span><span class="legend-dot" style="background:#b34b4b;"></span> Tajwid</span>
            <span><span class="legend-dot" style="background:#2980b9;"></span> Makhraj</span>
            <span><span class="legend-dot" style="background:#8e44ad;"></span> Sifat</span>
        </div>

        <!-- Tab pilih Ayat -->
        <div class="ayah-tabs" id="ayahTabs"></div>

        <!-- Kandungan akan dijana oleh JavaScript -->
        <div class="content-area" id="contentArea"></div>

        <footer>Quran 8 Ilmu API – Sumber terbuka untuk ummah 🌙</footer>
